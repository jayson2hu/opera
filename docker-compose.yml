services:
  backend:
    build:
      context: ./opera-server-py
    container_name: opera-backend
    env_file:
      - ./opera-server-py/.env
    environment:
      HOST: 0.0.0.0
      PORT: 3001
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3001/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./opera-app
      args:
        VITE_API_BASE_URL: ""
    container_name: opera-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
